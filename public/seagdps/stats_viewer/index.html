<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="title" content="CrazyFlyKite">
		<meta name="description" content="The Official SeaGDPS Stats Viewer">
		<meta name="keywords" content="CrazyFlyKite, Geometry Dash, SeaGDPS, Statistics, Stats Viewer, Points">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://crazyflykite.com/seagdps/stats_viewer">
		<meta property="og:title" content="SeaGDPS Stats Viewer">
		<meta property="og:site_name" content="SeaGDPS Stats Viewer">
		<meta property="og:description" content="The Official SeaGDPS Stats Viewer">
		<meta property="og:image" content="https://crazyflykite.com/images/icons/seagdps.png">
		<title>SeaGDPS Stats Viewer</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
		<link rel="stylesheet" href="/global.css">
		<link rel="stylesheet" href="/seagdps/seagdps.css">
		<link rel="stylesheet" href="styles.css">
		<link rel="icon" type="image/x-icon" href="/images/favicons/favicon2.png">
		<script defer src="index.js"></script>
	</head>
	<body>
		<!-- Body -->
		<header class="header-top">
			<div class="header-controls">
				<a href="/seagdps" class="header-control-button" aria-hidden="true"><i class="fa-solid fa-arrow-left"></i></a>
				<a href="/api/stats_viewer" class="header-control-button" target="_blank" rel="noopener" aria-hidden="true"><i class="fa-solid fa-code"></i></a>
			</div>
			<h1>Stats Viewer</h1>
		</header>
		<main>
			<div class="stats-container">
				<aside class="leaderboard-column">
					<div id="player-list" class="player-list"></div>
				</aside>
				<section class="player-viewer">
					<div id="player-card" class="player-card-content">
						<p style="text-align: center; opacity: 0.5;">Select a player to view stats</p>
					</div>
				</section>
			</div>
		</main>
		<footer>
			<p>© CrazyFlyKite 2026</p>
		</footer>
	</body>
</html>
